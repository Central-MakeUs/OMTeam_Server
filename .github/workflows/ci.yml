name: CI (빌드 · 테스트 · 품질 검사)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  JAVA_VERSION: '21'

jobs:
  # ===== OMT 애플리케이션 서버 빌드 & 테스트 =====
  build-app:
    name: 애플리케이션 서버 빌드 및 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK ${{ env.JAVA_VERSION }} 설정
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Gradle 환경 설정
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드 실행 (테스트 제외)
        run: ./gradlew build -x test

      - name: 테스트 실행
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7

      - name: 빌드 산출물(JAR) 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  # ===== Docker 이미지 빌드 (애플리케이션 서버) =====
  docker-build-app:
    name: 애플리케이션 서버 Docker 이미지 빌드
    runs-on: ubuntu-latest
    needs: build-app
    if: github.event_name == 'push'

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: 빌드 산출물(JAR) 다운로드
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: omt-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== 코드 품질 검사 =====
  code-quality:
    name: 코드 품질 검사
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK ${{ env.JAVA_VERSION }} 설정
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Gradle 환경 설정
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 코드 스타일 및 정적 검사 실행
        run: ./gradlew check -x test
        continue-on-error: true
