# Production override - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  omt-app:
    image: ${ECR_REGISTRY}/omt-app:${IMAGE_TAG:-latest}
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${RDS_URL}
      - SPRING_DATASOURCE_USERNAME=${RDS_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${RDS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - OAUTH_GOOGLE_ANDROID_CLIENT_ID=${OAUTH_GOOGLE_ANDROID_CLIENT_ID}
      - OAUTH_GOOGLE_IOS_CLIENT_ID=${OAUTH_GOOGLE_IOS_CLIENT_ID}
      - OAUTH_KAKAO_CLIENT_ID=${OAUTH_KAKAO_CLIENT_ID}
      - OAUTH_APPLE_CLIENT_ID=${OAUTH_APPLE_CLIENT_ID}
      - AI_SERVER_BASE_URL=http://omt-ai:8000
      - SPRING_DATA_REDIS_HOST=omt-redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      omt-ai:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  omt-ai:
    image: ${ECR_REGISTRY}/omt-ai:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          memory: 1G

  nginx:
    image: nginx:1.25
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot
      - ./certs:/etc/letsencrypt
    depends_on:
      - omt-app
    restart: always
    networks:
      - omt-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certs:/etc/letsencrypt
