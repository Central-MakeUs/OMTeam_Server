# Production override
# 사용: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  omt-app:
    image: ${ECR_REGISTRY}/omt-app:${IMAGE_TAG:-latest}
    build: !reset null
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-omt-redis}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRE=${JWT_ACCESS_EXPIRE:-300}
      - JWT_REFRESH_EXPIRE=${JWT_REFRESH_EXPIRE:-1209600}
      - OAUTH_GOOGLE_IOS_CLIENT_ID=${OAUTH_GOOGLE_IOS_CLIENT_ID}
      - OAUTH_GOOGLE_ANDROID_CLIENT_ID=${OAUTH_GOOGLE_ANDROID_CLIENT_ID}
      - OAUTH_KAKAO_CLIENT_ID=${OAUTH_KAKAO_CLIENT_ID}
      - OAUTH_KAKAO_TEST_CLIENT_ID=${OAUTH_KAKAO_TEST_CLIENT_ID}
      - OAUTH_APPLE_CLIENT_ID=${OAUTH_APPLE_CLIENT_ID}
      - AI_SERVER_BASE_URL=${AI_SERVER_BASE_URL:-http://omt-ai:8000}
      - FCM_SERVICE_ACCOUNT_PATH=/app/config/firebase-service-account.json
    volumes:
      - ${FCM_SERVICE_ACCOUNT_HOST_PATH:-/dev/null}:/app/config/firebase-service-account.json:ro
    deploy:
      resources:
        limits:
          memory: 1G

  omt-ai:
    image: ${ECR_REGISTRY}/omt-ai:${IMAGE_TAG:-latest}
    build: !reset null
    deploy:
      resources:
        limits:
          memory: 1G

  nginx:
    image: nginx:1.25
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot
      - ./certs:/etc/letsencrypt
    depends_on:
      - omt-app
    restart: always
    networks:
      - omt-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certs:/etc/letsencrypt
