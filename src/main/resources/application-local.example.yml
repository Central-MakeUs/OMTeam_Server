# 로컬 개발 환경 설정 예시
# 이 파일을 application-local.yml로 복사하여 사용하세요.
# application-local.yml은 .gitignore에 포함되어 있습니다.

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/omt_local_db?useSSL=false&serverTimezone=KST&allowPublicKeyRetrieval=true
    username: your_username
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

oauth:
  google:
    client-id: your_google_client_id
  kakao:
    client-id: your_kakao_client_id
  apple:
    client-id: your_apple_bundle_id
    public-key-uri: https://appleid.apple.com/auth/keys

jwt:
  secret: your_jwt_secret_key_at_least_32_characters_long
  access-token-expire-seconds: 300      # 5분
  refresh-token-expire-seconds: 1209600  # 14일
